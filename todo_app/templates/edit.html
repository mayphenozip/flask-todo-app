<!DOCTYPE html>
<html>
<head>
    <title>Редактировать задачу</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f4; }
        h1 { color: #0056b3; }
        input, button { padding: 8px; margin: 5px; border-radius: 4px; border: 1px solid #ccc; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; }
        .message { color: #dc3545; font-weight: bold; margin-bottom: 15px; }
        .cancel-link { text-decoration: none; color: #6c757d; margin-left: 10px; }
    </style>
</head>
<body>
    <h1>Редактирование задачи</h1>
    
    {% if message %} [cite: 304]
        <p class="message">{{ message }}</p> [cite: 402]
    {% endif %} [cite: 403]
    
    <form method="POST"> [cite: 307]
        <input type="text" name="task" value="{{ task.text }}" required> [cite: 308]
        <button type="submit">Сохранить</button> [cite: 309]
        <a class="cancel-link" href="/">Отмена</a> [cite: 310]
    </form>
</body>
</html>
