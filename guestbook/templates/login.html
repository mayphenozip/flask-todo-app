<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5 col-lg-4">
                
                <div class="card shadow-lg border-0">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <div class="display-5 text-primary"><i class="bi bi-shield-lock"></i></div>
                            <h3 class="fw-bold mt-2">Авторизация</h3>
                            <p class="text-muted small">Введите ваши данные для доступа к админке</p>
                        </div>

                        {% if login_error %}
                            <div class="alert alert-danger p-2 small text-center mb-3">
                                <i class="bi bi-exclamation-circle me-1"></i>{{ login_error }}
                            </div>
                        {% endif %}

                        <form action="/login" method="POST">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Логин</label>
                                <input type="text" name="username" class="form-control" placeholder="admin" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-bold">Пароль</label>
                                <input type="password" name="password" class="form-control" placeholder="••••" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Войти
                            </button>
                        </form>
                        
                        <div class="text-center mt-3">
                            <a href="/" class="text-muted small text-decoration-none">← На главную страницу</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
