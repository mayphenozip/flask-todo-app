<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Подтверждение удаления</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 100px; background-color: #f8f9fa; }
        .confirm-box { background: white; display: inline-block; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #dc3545; }
        .btn-danger { background-color: #dc3545; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-decoration: none; }
        .btn-secondary { background-color: #6c757d; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="confirm-box">
        <h2>⚠️ Вы уверены?</h2>
        <p>Это действие навсегда удалит абсолютно все сообщения из гостевой книги!</p>
        <br>
        <form action="/clear_all_messages" method="POST" style="display: inline;">
            <button type="submit" class="btn-danger">Да, удалить всё</button>
        </form>
        <a href="/" class="btn-secondary">Отмена</a>
    </div>
</body>
</html>
